<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charlon Mini POS Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f6f7; margin:0; padding:16px; color:#111; }
    .container { max-width:760px; margin:0 auto; }
    .card { background:#fff; border-radius:14px; padding:18px; margin-bottom:14px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    h1,h2,h3 { margin-top:0; }
    label { display:block; font-weight:700; margin-top:10px; font-size:13px; }
    input, select, textarea, button { width:100%; box-sizing:border-box; padding:12px; margin-top:6px; margin-bottom:10px; border-radius:9px; border:1px solid #ccc; font-size:16px; }
    button { background:#111; color:#fff; border:none; font-weight:700; cursor:pointer; }
    button.secondary { background:#666; }
    button.success { background:#198754; }
    button.danger { background:#b42318; }
    button.choice { text-align:left; padding:16px; font-size:17px; }
    .button-grid { display:grid; grid-template-columns:1fr; gap:10px; }
    .coming-soon { opacity:.7; }
    .hidden { display:none !important; }
    .muted { color:#666; font-size:13px; }
    .success-text { color:#198754; font-weight:700; }
    .error { color:#b42318; font-weight:700; }
    .info { color:#1f4e79; font-weight:700; }
    #status { white-space:normal; line-height:1.4; }
    #reader { width:100%; margin-top:10px; }
    .product-box { line-height:1.6; font-size:15px; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; background:#eee; font-size:12px; font-weight:700; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media(max-width:600px){ .row{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="container">
  <div class="card" id="loginCard">
    <h1>Charlon Mini POS</h1>
    <p class="muted">Staff ID login · v88</p>

    <label>Staff ID</label>
    <input type="text" id="staffId" placeholder="Example: CE001" autocomplete="off">

    <label>PIN</label>
    <input type="password" id="pin" placeholder="Enter PIN" autocomplete="off" inputmode="numeric" pattern="[0-9]*">

    <button id="loginBtn" type="button">Login</button>
  </div>

  <div class="card hidden" id="changePinCard">
    <h2>Change PIN Required</h2>
    <p class="muted">This is required once before using the scanner.</p>

    <label>New PIN</label>
    <input type="password" id="newPin" placeholder="4 to 8 numbers" autocomplete="off" inputmode="numeric" pattern="[0-9]*">

    <label>Confirm New PIN</label>
    <input type="password" id="confirmPin" placeholder="Re-enter new PIN" autocomplete="off" inputmode="numeric" pattern="[0-9]*">

    <button id="changePinBtn" type="button">Save New PIN</button>
    <button class="secondary" type="button" onclick="logout()">Cancel / Logout</button>
  </div>

  <div class="card hidden" id="homeCard">
    <h2 id="welcomeText">Welcome</h2>
    <p id="userInfo" class="muted"></p>
    <h3>Choose Action</h3>
    <div id="homeButtons" class="button-grid"></div>
    <button class="danger" type="button" onclick="logout()">Logout</button>
  </div>

  <div class="card hidden" id="scanCard">
    <h2 id="transactionTitle">Scan Product</h2>
    <label>Barcode / SKU</label>
    <input type="text" id="searchValue" placeholder="Scan or type barcode" autocomplete="off">
    <button type="button" onclick="findProduct()">Find Product</button>
    <button class="secondary" type="button" onclick="startCamera()">Start Camera Scanner</button>
    <button class="secondary" type="button" onclick="stopCamera()">Stop Camera Scanner</button>
    <div id="reader"></div>
    <button class="secondary" type="button" onclick="backHome()">Back</button>
  </div>

  <div class="card hidden" id="productCard">
    <h3>Product Found</h3>
    <div class="product-box" id="productInfo"></div>
  </div>

  <div class="card hidden" id="formCard">
    <h3 id="formTitle">Transaction Form</h3>
    <div id="formFields"></div>
    <button class="success" type="button" onclick="submitTransaction()">Submit</button>
  </div>

  <div class="card">
    <strong>Status:</strong>
    <div id="status" class="muted">Ready.</div>
  </div>
</div>

<script>
'use strict';

const API_URL = "https://script.google.com/macros/s/AKfycbx7iFaGeikvykjRicd8kcv6NZQAFg5oYwaRTXU3m4ylM4l8mvqaS84X-iUgLrFWiNUUrw/exec";

let currentUser = null;
let currentPin = "";
let settings = {};
let currentType = "";
let currentProduct = null;
let scanner = null;
let audioCtx = null;
let isSubmitting = false;

const ACTION_BUTTONS = [
  { key: "CHECKSTOCK", type: "CHECK_STOCK", label: "Check Stock", live: true },
  { key: "SALES", type: "SALE", label: "Sales", live: true },
  { key: "PURCHASES", type: "PURCHASE", label: "Purchases", live: true },
  { key: "COUNTCHECK", type: "COUNT_CHECK", label: "Count Check", live: true },
  { key: "RELEASING", type: "RELEASING", label: "Release Item", live: true },
  { key: "DELIVERY", type: "DELIVERY", label: "Delivery", live: false },
  { key: "TRANSFER", type: "TRANSFER", label: "Move Item Location", live: true },
  { key: "RETURNCANCELRELEASE", type: "RETURN_CANCEL_RELEASE", label: "Return / Cancelled Item", live: true },
  { key: "INVENTORYADJUSTMENT", type: "INVENTORY_ADJUSTMENT", label: "Inventory Adjustment", live: false },
  { key: "REPORTSHISTORY", type: "REPORTS_HISTORY", label: "Reports", live: false }
];

function setStatus(text, type = "") {
  const el = document.getElementById("status");
  el.className = type || "muted";
  el.innerHTML = text || "";
}

function show(id) { document.getElementById(id).classList.remove("hidden"); }
function hide(id) { document.getElementById(id).classList.add("hidden"); }
function today() { return new Date().toISOString().slice(0, 10); }
function val(id) { const el = document.getElementById(id); return el ? el.value : ""; }

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function unlockScanSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch (err) {
    console.log("Audio unlock failed:", err);
  }
}

function playScanSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(950, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.18);
    if (navigator.vibrate) navigator.vibrate(80);
  } catch (err) {
    console.log("Scan sound failed:", err);
  }
}

function apiCall(params) {
  return new Promise((resolve, reject) => {
    const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    params.callback = callbackName;
    const url = API_URL + "?" + new URLSearchParams(params).toString();
    console.log("API request:", url);

    let finished = false;
    let script = document.createElement("script");

    const timeout = setTimeout(() => {
      if (finished) return;
      finished = true;
      delete window[callbackName];
      if (script && script.parentNode) script.parentNode.removeChild(script);
      reject(new Error("API request timed out. Check internet, API URL, or browser blocker."));
    }, 50000);

    window[callbackName] = function(data) {
      if (finished) return;
      finished = true;
      clearTimeout(timeout);
      delete window[callbackName];
      if (script && script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };

    script.src = url;
    script.onerror = function() {
      if (finished) return;
      finished = true;
      clearTimeout(timeout);
      delete window[callbackName];
      if (script && script.parentNode) script.parentNode.removeChild(script);
      reject(new Error("API request failed. Check Apps Script deployment/access."));
    };

    document.body.appendChild(script);
  });
}

async function login() {
  const staffId = val("staffId").trim().toUpperCase();
  const pin = val("pin").trim();

  if (!staffId) {
    setStatus("Please enter Staff ID.", "error");
    return;
  }

  if (!pin) {
    setStatus("Please enter PIN.", "error");
    return;
  }

  setStatus("Logging in...", "info");

  try {
    const res = await apiCall({ action: "login", staffId, pin });
    console.log("Login response:", res);

    if (!res || !res.success) {
      setStatus((res && res.message) ? res.message : "Login failed.", "error");
      return;
    }

    currentUser = res.user;
    currentPin = pin;
    settings = res.settings || {};

    hide("loginCard");

    if (currentUser.mustChangePin) {
      show("changePinCard");
      setStatus("Temporary PIN detected. Please create your own PIN.", "info");
      setTimeout(() => document.getElementById("newPin").focus(), 200);
      return;
    }

    openHome();
    setStatus("Login successful.", "success-text");
  } catch (err) {
    console.error("Login error:", err);
    setStatus("Login error: " + escapeHtml(err.message || err), "error");
  }
}

async function changePin() {
  if (!currentUser) {
    setStatus("Please login first.", "error");
    return;
  }

  const newPin = val("newPin").trim();
  const confirmPin = val("confirmPin").trim();

  if (!newPin || !confirmPin) {
    setStatus("Enter and confirm your new PIN.", "error");
    return;
  }

  setStatus("Saving new PIN...", "info");

  try {
    const res = await apiCall({
      action: "changePin",
      staffId: currentUser.staffId,
      pin: currentPin,
      newPin,
      confirmPin
    });

    console.log("Change PIN response:", res);

    if (!res || !res.success) {
      setStatus((res && res.message) ? res.message : "PIN change failed.", "error");
      return;
    }

    currentUser = res.user;
    currentPin = newPin;
    settings = res.settings || settings;

    document.getElementById("pin").value = newPin;
    document.getElementById("newPin").value = "";
    document.getElementById("confirmPin").value = "";

    hide("changePinCard");
    openHome();
    setStatus("PIN changed successfully. You can use this PIN for your next login.", "success-text");
  } catch (err) {
    console.error("Change PIN error:", err);
    setStatus("Change PIN error: " + escapeHtml(err.message || err), "error");
  }
}

function openHome() {
  show("homeCard");
  document.getElementById("welcomeText").innerText = "Welcome, " + currentUser.name;
  document.getElementById("userInfo").innerText =
    "Staff ID: " + currentUser.staffId +
    " | Role: " + currentUser.role +
    " | Location: " + currentUser.location;

  renderHomeButtons();
}

function canAccess(actionKey) {
  const allowed = (currentUser && currentUser.allowedActions) ? currentUser.allowedActions : {};
  return allowed[actionKey] === true;
}

function renderHomeButtons() {
  const container = document.getElementById("homeButtons");
  container.innerHTML = "";

  ACTION_BUTTONS.forEach(btn => {
    if (!canAccess(btn.key)) return;

    const button = document.createElement("button");
    button.type = "button";
    button.className = btn.live ? "choice" : "choice secondary coming-soon";
    button.textContent = btn.live ? btn.label : btn.label + " (next update)";
    button.onclick = function() {
      if (!btn.live) {
        setStatus(btn.label + " is allowed for your role, but the form is not built yet.", "info");
        return;
      }
      chooseType(btn.type);
    };

    container.appendChild(button);
  });
}

function logout() {
  stopCamera();
  currentUser = null;
  currentPin = "";
  settings = {};
  currentType = "";
  currentProduct = null;
  hide("homeCard"); hide("changePinCard"); hide("scanCard"); hide("productCard"); hide("formCard"); show("loginCard");
  document.getElementById("staffId").value = "";
  document.getElementById("pin").value = "";
  document.getElementById("newPin").value = "";
  document.getElementById("confirmPin").value = "";
  document.getElementById("searchValue").value = "";
  setStatus("Logged out.", "muted");
}

function chooseType(type) {
  currentType = type;
  currentProduct = null;
  hide("homeCard"); show("scanCard"); hide("productCard"); hide("formCard");
  document.getElementById("searchValue").value = "";
  const titles = {
    SALE: "Sales",
    PURCHASE: "Purchase",
    COUNT_CHECK: "Count Check",
    CHECK_STOCK: "Check Stock",
    RELEASING: "Release Item",
    RETURN_CANCEL_RELEASE: "Return / Cancelled Item",
    TRANSFER: "Move Item Location"
  };
  document.getElementById("transactionTitle").innerText = titles[type] || "Scan Product";
  setStatus("Scan QR code or type SKU.", "muted");
  setTimeout(() => document.getElementById("searchValue").focus(), 300);
}

function backHome() {
  stopCamera(); hide("scanCard"); hide("productCard"); hide("formCard"); show("homeCard");
  setStatus("Choose transaction type.", "muted");
}

async function startCamera() {
  unlockScanSound();
  if (!currentUser) { setStatus("Please login first.", "error"); return; }
  try {
    setStatus("Starting camera...", "info");
    if (typeof Html5Qrcode === "undefined") throw new Error("html5-qrcode did not load.");
    if (!scanner) scanner = new Html5Qrcode("reader");
    if (scanner.isScanning) return;

    await scanner.start(
      { facingMode: "environment" },
      {
        fps: 12,
        qrbox: function(w, h) {
          const minEdge = Math.min(w, h);
          const qrSize = Math.floor(minEdge * 0.75);
          return { width: qrSize, height: qrSize };
        },
        aspectRatio: 1.0,
        disableFlip: false,
        experimentalFeatures: { useBarCodeDetectorIfSupported: true },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.QR_CODE,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E
        ]
      },
      decodedText => {
        playScanSound();
        document.getElementById("searchValue").value = decodedText;
        setStatus("Scanned: " + escapeHtml(decodedText), "success-text");
        stopCamera();
        findProduct();
      },
      errorMessage => {}
    );

    setStatus("Camera started. Point at the QR code inside the square.", "success-text");
  } catch (err) {
    console.error("Camera error:", err);
    setStatus("Camera failed: " + escapeHtml(err.message || err), "error");
  }
}

async function stopCamera() {
  try {
    if (scanner && scanner.isScanning) await scanner.stop();
  } catch (err) { console.log("Stop camera ignored:", err); }
}

async function findProduct() {
  const searchValue = val("searchValue").trim();
  if (!searchValue) { setStatus("Please scan or type barcode/SKU.", "error"); return; }
  setStatus("Searching product...", "info");
  try {
    const res = await apiCall({ action:"findProduct", staffId: currentUser.staffId, pin: currentPin, searchValue });
    console.log("Find product response:", res);
    if (!res || !res.success) { setStatus((res && res.message) ? res.message : "Product not found.", "error"); return; }
    currentProduct = res.product;
    renderProduct();
    renderForm();
    setStatus("Product found.", "success-text");
  } catch (err) {
    console.error("Find product error:", err);
    setStatus("Find product error: " + escapeHtml(err.message || err), "error");
  }
}

function renderProduct() {
  const p = currentProduct || {};
  document.getElementById("productInfo").innerHTML = `
    <strong>${escapeHtml(p.productName || "")}</strong><br>
    SKU: ${escapeHtml(p.sku || "")}<br>
    Barcode: ${escapeHtml(p.barcodeValue || "")}<br>
    QBO ID: ${escapeHtml(p.qboId || "")}<br>
    Stock Type: <span class="badge">${escapeHtml(p.stockType || "")}</span><br>
    Location: ${escapeHtml(p.location || "")}<br>
    Current Qty: <strong>${p.currentQty}</strong><br>
    Average Cost: ₱${Number(p.averageCost || 0).toLocaleString()}<br>
    Selling Price: ₱${Number(p.sellingPrice || 0).toLocaleString()}<br>
    Inventory Status: ${escapeHtml(p.inventoryStatus || "")}
  `;
  show("productCard");
}

function renderForm() {
  if (currentType === "CHECK_STOCK") { hide("formCard"); return; }
  show("formCard");
  if (currentType === "SALE") renderSaleForm();
  if (currentType === "PURCHASE") renderPurchaseForm();
  if (currentType === "COUNT_CHECK") renderCountCheckForm();
  if (currentType === "RELEASING") renderReleasingForm();
  if (currentType === "RETURN_CANCEL_RELEASE") renderReturnCancelForm();
  if (currentType === "TRANSFER") renderTransferForm();
}

function selectHtml(id, options, selected = "") {
  options = options || [];
  let html = `<select id="${id}"><option value="">Select</option>`;
  options.forEach(option => {
    const isSelected = String(option) === String(selected) ? "selected" : "";
    html += `<option value="${escapeHtml(option)}" ${isSelected}>${escapeHtml(option)}</option>`;
  });
  html += `</select>`;
  return html;
}

function renderSaleForm() {
  document.getElementById("formTitle").innerText = "Sales / Stock Out Form";
  document.getElementById("formFields").innerHTML = `
    <p class="muted">
      Gamitin ito kapag sure na sold/paid na ang item at ilalabas na talaga sa inventory.
    </p>
    
    <label>Date Sold</label><input type="date" id="dateSold" value="${today()}">
    <label>Sales Channel</label>${selectHtml("salesChannel", settings.salesChannels)}
    <div class="row"><div><label>Sold By</label>${selectHtml("soldBy", settings.staffNames, currentUser.name)}</div><div><label>Released By</label>${selectHtml("releasedBy", settings.staffNames)}</div></div>
    <label>Packed By</label>${selectHtml("packedBy", settings.staffNames)}
    <div class="row"><div><label>Quantity</label><input type="number" id="quantity" min="1" value="1"></div><div><label>Price Per Unit</label><input type="number" id="pricePerUnit" min="0" step="0.01" value="${Number(currentProduct.sellingPrice || 0)}"></div></div>
    <label>Order No.</label><input type="text" id="orderNo">
    <label>Customer Name</label><input type="text" id="customerName">
    <label>Payment Status</label>${selectHtml("paymentStatus", settings.paymentStatus)}
    <label>Notes</label><textarea id="notes"></textarea>
  `;
}

function renderPurchaseForm() {
  document.getElementById("formTitle").innerText = "Purchase / Stock In Form";
  document.getElementById("formFields").innerHTML = `
    <p class="muted">
      Gamitin ito kapag may bagong item na dumating.
    </p>
  
    <label>Date Received</label><input type="date" id="dateReceived" value="${today()}">
    <label>Supplier / Store</label><input type="text" id="supplier">
    <div class="row"><div><label>Received By</label>${selectHtml("receivedBy", settings.staffNames, currentUser.name)}</div><div><label>Checked By</label>${selectHtml("checkedBy", settings.staffNames)}</div></div>
    <div class="row"><div><label>Quantity</label><input type="number" id="quantity" min="1" value="1"></div><div><label>Cost Per Unit</label><input type="number" id="costPerUnit" min="0" step="0.01" value="${Number(currentProduct.averageCost || 0)}"></div></div>
    <label>Receipt / Invoice No.</label><input type="text" id="receiptNo">
    <label>Payment Status</label>${selectHtml("paymentStatus", settings.paymentStatus)}
    <label>Notes</label><textarea id="notes"></textarea>
  `;
}

function renderCountCheckForm() {
  document.getElementById("formTitle").innerText = "Count Check Form";
  document.getElementById("formFields").innerHTML = `
    <label>Date Checked</label><input type="date" id="dateChecked" value="${today()}">
    <label>System Qty</label><input type="number" value="${Number(currentProduct.currentQty || 0)}" disabled>
    <label>Actual Qty</label><input type="number" id="actualQty" min="0" value="${Number(currentProduct.currentQty || 0)}">
    <label>Checked By</label>${selectHtml("checkedBy", settings.staffNames, currentUser.name)}
    <label>Notes</label><textarea id="notes"></textarea>
  `;
}

function renderReleasingForm() {
  document.getElementById("formTitle").innerText = "Releasing Form";

  document.getElementById("formFields").innerHTML = `
    <p class="muted">
      Gamitin ito kapag kinuha na ang item para sa customer pero hindi pa sure kung tuloy ang sale/order.
    </p>
    
    <label>Date Released</label>
    <input type="date" id="dateReleased" value="${today()}">

    <label>Reference No. / Order No.</label>
    <input type="text" id="referenceNo" placeholder="Example: Shopee order, FB customer, walk-in request">

    <label>Customer Name</label>
    <input type="text" id="customerName">

    <div class="row">
      <div>
        <label>Quantity</label>
        <input type="number" id="quantity" min="1" value="1">
      </div>
      <div>
        <label>Released By</label>
        ${selectHtml("releasedBy", settings.staffNames, currentUser.name)}
      </div>
    </div>

    <label>Released To / Temp Location</label>
    ${selectHtml("releaseToLocation", settings.locations, "RELEASED / PENDING CUSTOMER")}

    <label>Notes</label>
    <textarea id="notes"></textarea>
  `;
}

function renderReturnCancelForm() {
  document.getElementById("formTitle").innerText = "Return / Cancelled Item Form";

  document.getElementById("formFields").innerHTML = `
    <p class="muted">
      Gamitin ito kapag na-cancel ang order, na-refund ang sale, mali ang item na nailabas,
      na-return ang item, o kailangang ibalik sa ibang location.
    </p>

    <label>Ano ang nangyari?</label>
    <select id="returnActionType">
      <option value="">Select</option>
      <option value="MOVE_BACK">Na-release pero na-cancel / ibabalik sa stock</option>
      <option value="RESTOCK_SOLD">Na-sale na pero cancelled / refunded</option>
      <option value="DELIVERY_RETURN">Galing delivery pero binalik / failed delivery</option>
      <option value="WRONG_ITEM">Maling item ang nailabas</option>
      <option value="OTHER">Other</option>
    </select>

    <label>Date Returned</label>
    <input type="date" id="dateReturned" value="${today()}">

    <label>Reference No. / Order No.</label>
    <input type="text" id="referenceNo" placeholder="Shopee/Lazada/FB/Walk-in order no.">

    <div class="row">
      <div>
        <label>Quantity</label>
        <input type="number" id="quantity" min="1" value="1">
      </div>
      <div>
        <label>Handled By</label>
        ${selectHtml("handledBy", settings.staffNames, currentUser.name)}
      </div>
    </div>

    <label>Return From Location</label>
    ${selectHtml("returnFromLocation", settings.locations, "RELEASED / PENDING CUSTOMER")}

    <label>Return To Location</label>
    ${selectHtml("returnToLocation", settings.locations, currentProduct.location || currentUser.location)}

    <label>Reason / Details</label>
    <select id="reason">
      <option value="">Select</option>
      <option value="Customer cancelled">Customer cancelled</option>
      <option value="Sale cancelled / refunded">Sale cancelled / refunded</option>
      <option value="Order did not push through">Order did not push through</option>
      <option value="Wrong item released">Wrong item released</option>
      <option value="Failed delivery">Failed delivery</option>
      <option value="Returned for checking">Returned for checking</option>
      <option value="Other">Other</option>
    </select>

    <label>Notes</label>
    <textarea id="notes" placeholder="Optional details"></textarea>
  `;
}

function renderTransferForm() {
  document.getElementById("formTitle").innerText = "Transfer Form";

  document.getElementById("formFields").innerHTML = `
    <p class="muted">
      Gamitin ito kapag ililipat ang item mula sa isang location papunta sa ibang location.
    </p>
    
    <label>Transfer Date</label>
    <input type="date" id="transferDate" value="${today()}">

    <label>Transfer No. / Reference No.</label>
    <input type="text" id="transferNo" placeholder="Example: TRF-001">

    <div class="row">
      <div>
        <label>From Location</label>
        ${selectHtml("fromLocation", settings.locations, currentUser.location)}
      </div>
      <div>
        <label>To Location</label>
        ${selectHtml("toLocation", settings.locations)}
      </div>
    </div>

    <label>Quantity</label>
    <input type="number" id="quantity" min="1" value="1">

    <div class="row">
      <div>
        <label>Sent By</label>
        ${selectHtml("sentBy", settings.staffNames, currentUser.name)}
      </div>
      <div>
        <label>Received By</label>
        ${selectHtml("receivedBy", settings.staffNames)}
      </div>
    </div>

    <label>Transfer Status</label>
    <select id="transferStatus">
      <option value="COMPLETED">COMPLETED</option>
      <option value="IN TRANSIT">IN TRANSIT</option>
      <option value="PENDING">PENDING</option>
    </select>

    <label>Courier / Driver</label>
    <input type="text" id="courierDriver">

    <label>Notes</label>
    <textarea id="notes"></textarea>
  `;
}

 function buildConfirmMessage() {
  const productName = currentProduct ? currentProduct.productName : "";
  const sku = currentProduct ? currentProduct.sku : "";
  const qty = val("quantity") || "";

  let actionName = currentType;
  let details = "";

  if (currentType === "SALE") {
    actionName = "Sold Item / Stock Out";
    details =
      "Qty: " + qty + "\n" +
      "Order No.: " + val("orderNo") + "\n" +
      "Customer: " + val("customerName") + "\n" +
      "Sold By: " + val("soldBy");
  }

  if (currentType === "PURCHASE") {
    actionName = "Stock In / New Arrival";
    details =
      "Qty: " + qty + "\n" +
      "Supplier: " + val("supplier") + "\n" +
      "Received By: " + val("receivedBy");
  }

  if (currentType === "COUNT_CHECK") {
    actionName = "Count Actual Stock";
    details =
      "System Qty: " + Number(currentProduct.currentQty || 0) + "\n" +
      "Actual Qty: " + val("actualQty") + "\n" +
      "Checked By: " + val("checkedBy");
  }

  if (currentType === "RELEASING") {
    actionName = "Release Item to Customer";
    details =
      "Qty: " + qty + "\n" +
      "From: " + (currentProduct.location || "") + "\n" +
      "To: " + val("releaseToLocation") + "\n" +
      "Customer: " + val("customerName") + "\n" +
      "Released By: " + val("releasedBy");
  }

  if (currentType === "RETURN_CANCEL_RELEASE") {
    actionName = "Return / Cancelled Item";
    details =
      "Type: " + val("returnActionType") + "\n" +
      "Qty: " + qty + "\n" +
      "From: " + val("returnFromLocation") + "\n" +
      "To: " + val("returnToLocation") + "\n" +
      "Handled By: " + val("handledBy") + "\n" +
      "Reason: " + val("reason");
  }

  if (currentType === "TRANSFER") {
    actionName = "Move Item Location";
    details =
      "Qty: " + qty + "\n" +
      "From: " + val("fromLocation") + "\n" +
      "To: " + val("toLocation") + "\n" +
      "Sent By: " + val("sentBy") + "\n" +
      "Received By: " + val("receivedBy");
  }

  return (
    "Please confirm before saving:\n\n" +
    "Action: " + actionName + "\n" +
    "Product: " + productName + "\n" +
    "SKU: " + sku + "\n\n" +
    details + "\n\n" +
    "Continue?"
  );
} 
  
async function submitTransaction() {
  if (isSubmitting) return;
  if (!currentProduct) { setStatus("Please find a product first.", "error"); return; }
  isSubmitting = true;
  const searchValue = val("searchValue").trim();
  let params = { staffId: currentUser.staffId, pin: currentPin, searchValue };

  if (currentType === "SALE") {
    params = { ...params, action:"submitSale", dateSold:val("dateSold"), salesChannel:val("salesChannel"), soldBy:val("soldBy"), releasedBy:val("releasedBy"), packedBy:val("packedBy"), quantity:val("quantity"), pricePerUnit:val("pricePerUnit"), orderNo:val("orderNo"), customerName:val("customerName"), paymentStatus:val("paymentStatus"), notes:val("notes") };
  } else if (currentType === "PURCHASE") {
    params = { ...params, action:"submitPurchase", dateReceived:val("dateReceived"), supplier:val("supplier"), receivedBy:val("receivedBy"), checkedBy:val("checkedBy"), quantity:val("quantity"), costPerUnit:val("costPerUnit"), receiptNo:val("receiptNo"), paymentStatus:val("paymentStatus"), notes:val("notes") };
  } else if (currentType === "COUNT_CHECK") {
    params = {
      ...params,
      action: "submitCountCheck",
      dateChecked: val("dateChecked"),
      actualQty: val("actualQty"),
      checkedBy: val("checkedBy"),
      notes: val("notes")
    };
  } else if (currentType === "RELEASING") {
    params = {
      ...params,
      action: "submitReleasing",
      dateReleased: val("dateReleased"),
      referenceNo: val("referenceNo"),
      customerName: val("customerName"),
      quantity: val("quantity"),
      releasedBy: val("releasedBy"),
      releaseToLocation: val("releaseToLocation"),
      notes: val("notes")
    };
  } else if (currentType === "RETURN_CANCEL_RELEASE") {
    params = {
      ...params,
      action: "submitReturnCancelRelease",
      returnActionType: val("returnActionType"),
      dateReturned: val("dateReturned"),
      referenceNo: val("referenceNo"),
      quantity: val("quantity"),
      handledBy: val("handledBy"),
      returnFromLocation: val("returnFromLocation"),
      returnToLocation: val("returnToLocation"),
      reason: val("reason"),
      notes: val("notes")
    };
  } else if (currentType === "TRANSFER") {
    params = {
      ...params,
      action: "submitTransfer",
      transferDate: val("transferDate"),
      transferNo: val("transferNo"),
      fromLocation: val("fromLocation"),
      toLocation: val("toLocation"),
      quantity: val("quantity"),
      sentBy: val("sentBy"),
      receivedBy: val("receivedBy"),
      transferStatus: val("transferStatus"),
      courierDriver: val("courierDriver"),
      notes: val("notes")
    };
  } else {
    isSubmitting = false;
    setStatus("Invalid transaction type.", "error");
    return;
  }

  const confirmMessage = buildConfirmMessage();
  
  if (!confirm(confirmMessage)) {
    isSubmitting = false;
    setStatus("Transaction cancelled. Nothing was saved.", "muted");
    return;
  }
  
  setStatus("Submitting transaction...", "info");
  try {
    const res = await apiCall(params);
    console.log("Submit response:", res);
    if (!res || !res.success) { setStatus((res && res.message) ? res.message : "Transaction failed.", "error"); return; }
    let extra = "";
    if (res.oldQty !== undefined && res.newQty !== undefined) extra += `<br>Old Qty: ${res.oldQty}<br>New Qty: ${res.newQty}`;
    if (res.systemQty !== undefined) extra += `<br>System Qty: ${res.systemQty}<br>Actual Qty: ${res.actualQty}<br>Difference: ${res.difference}`;
    if (res.affectsInventory === false) extra += `<br><span class="muted">Note: This item does not affect inventory quantity.</span>`;
    setStatus(`${escapeHtml(res.message)}<br>Product: ${escapeHtml(res.productName || "")}${extra}`, "success-text");
    hide("formCard"); currentProduct = null; document.getElementById("searchValue").value = "";
  } catch (err) {
    console.error("Submit error:", err);
    setStatus("Submit error: " + escapeHtml(err.message || err), "error");
  } finally {
    isSubmitting = false;
  }
}

window.addEventListener("DOMContentLoaded", function() {
  document.getElementById("loginBtn").addEventListener("click", login);
  document.getElementById("changePinBtn").addEventListener("click", changePin);

  document.getElementById("staffId").addEventListener("keydown", function(e) {
    if (e.key === "Enter") { e.preventDefault(); document.getElementById("pin").focus(); }
  });

  document.getElementById("pin").addEventListener("keydown", function(e) {
    if (e.key === "Enter") { e.preventDefault(); login(); }
  });

  document.getElementById("confirmPin").addEventListener("keydown", function(e) {
    if (e.key === "Enter") { e.preventDefault(); changePin(); }
  });

  document.getElementById("searchValue").addEventListener("keydown", function(e) {
    if (e.key === "Enter") { e.preventDefault(); findProduct(); }
  });

  setStatus("Ready.", "muted");
});
</script>
